services:
  db:
    image: postgres:16
    container_name: hrms-lite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hrms_lite
    ports:
      - "5433:5432"
    volumes:
      - hrms_lite_pgdata:/var/lib/postgresql/data

volumes:
  hrms_lite_pgdata:

